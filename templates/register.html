{% extends "base.html" %}

{% block title %}注册 - PicHome{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="8" r="4" fill="#8b5cf6"/>
                    <path d="M20 21a8 8 0 10-16 0" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="19" cy="7" r="2" fill="#6366f1"/>
                    <path d="M21 12a4 4 0 11-8 0" stroke="#8b5cf6" stroke-width="2"/>
                </svg>
            </span>
            <h1>创建账户</h1>
            <p>加入 PicHome，开始分享图片</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required 
                       placeholder="设置用户名" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required 
                       placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required 
                       placeholder="至少6位" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm" required 
                       placeholder="再次输入密码" autocomplete="new-password">
            </div>

            <button type="submit" class="btn-submit">注册</button>
        </form>

        <div class="auth-footer">
            <p>已有账户？<a href="{{ url_for('login') }}">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}
