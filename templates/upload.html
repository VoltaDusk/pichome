{% extends "base.html" %}

{% block title %}上传图片 - PicHome{% endblock %}

{% block content %}
<div class="upload-container">
    <div class="upload-card">
        <div class="upload-header">
            <span class="upload-icon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="17 8 12 3 7 8" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="12" y1="3" x2="12" y2="15" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </span>
            <h1>上传图片</h1>
            <p>支持拖拽或点击选择，最多 10MB</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="upload-form" id="uploadForm">
            <div class="drop-zone" id="dropZone">
                <div class="drop-content">
                    <span class="drop-icon">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                            <polyline points="17 8 12 3 7 8" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="12" y1="3" x2="12" y2="15" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <p>拖拽图片到这里，或 <label for="fileInput" class="browse-link">浏览选择</label></p>
                    <p class="drop-hint">支持 PNG, JPG, GIF, WebP, BMP</p>
                </div>
                <input type="file" id="fileInput" name="file" accept="image/*" hidden>
            </div>

            <div class="preview-area" id="previewArea" style="display: none;">
                <img id="previewImage" src="" alt="预览">
                <button type="button" class="remove-btn" id="removeBtn">✕</button>
            </div>

            <div class="form-group">
                <label for="tags">标签（可选）</label>
                <input type="text" id="tags" name="tags" 
                       placeholder="用逗号分隔多个标签，如: 风景, 旅行, 美食">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>上传</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const previewImage = document.getElementById('previewImage');
const removeBtn = document.getElementById('removeBtn');
const submitBtn = document.getElementById('submitBtn');

// 点击浏览
fileInput.addEventListener('change', handleFile);

// 拖拽
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
        handleFile({ target: { files: e.dataTransfer.files } });
    }
});

function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        alert('请选择图片文件');
        return;
    }

    if (file.size > 10 * 1024 * 1024) {
        alert('文件大小不能超过 10MB');
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewArea.style.display = 'block';
        dropZone.style.display = 'none';
        submitBtn.disabled = false;
    };
    reader.readAsDataURL(file);
}

removeBtn.addEventListener('click', () => {
    fileInput.value = '';
    previewArea.style.display = 'none';
    dropZone.style.display = 'flex';
    submitBtn.disabled = true;
});
</script>
{% endblock %}
